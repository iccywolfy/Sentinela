global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: sentinela

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']
    metrics_path: /metrics

  - job_name: 'ingestion-service'
    static_configs:
      - targets: ['ingestion-service:3001']
    metrics_path: /metrics

  - job_name: 'correlation-service'
    static_configs:
      - targets: ['correlation-service:3002']
    metrics_path: /metrics

  - job_name: 'alert-service'
    static_configs:
      - targets: ['alert-service:3003']
    metrics_path: /metrics

  - job_name: 'report-service'
    static_configs:
      - targets: ['report-service:3004']
    metrics_path: /metrics

  - job_name: 'nlp-service'
    static_configs:
      - targets: ['nlp-service:8000']
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch-exporter:9114']
