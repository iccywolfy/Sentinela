{{/* Ingestion Service */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ingestion-service
  labels:
    {{- include "sentinela.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-service
spec:
  replicas: {{ .Values.ingestionService.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinela.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ingestion-service
  template:
    metadata:
      labels:
        {{- include "sentinela.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ingestion-service
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: ingestion-service
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.ingestionService.image.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.ingestionService.service.port }}
          env:
            {{- include "sentinela.commonEnv" . | nindent 12 }}
            - name: PORT
              value: {{ .Values.ingestionService.service.port | quote }}
          resources:
            {{- toYaml .Values.ingestionService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ingestionService.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ingestion-service
  labels:
    {{- include "sentinela.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.ingestionService.service.port }}
      targetPort: {{ .Values.ingestionService.service.port }}
  selector:
    {{- include "sentinela.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-service
---
