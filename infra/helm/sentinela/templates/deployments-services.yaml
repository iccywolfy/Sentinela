{{/* NLP Service */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-nlp-service
  labels:
    {{- include "sentinela.labels" . | nindent 4 }}
    app.kubernetes.io/component: nlp-service
spec:
  replicas: {{ .Values.nlpService.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinela.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nlp-service
  template:
    metadata:
      labels:
        {{- include "sentinela.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nlp-service
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: nlp-service
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.nlpService.image.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.nlpService.service.port }}
          env:
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379"
            - name: PORT
              value: {{ .Values.nlpService.service.port | quote }}
          resources:
            {{- toYaml .Values.nlpService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.nlpService.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-nlp-service
  labels:
    {{- include "sentinela.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.nlpService.service.port }}
      targetPort: {{ .Values.nlpService.service.port }}
  selector:
    {{- include "sentinela.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nlp-service
---
{{/* Frontend */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    {{- include "sentinela.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinela.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "sentinela.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
      containers:
        - name: frontend
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.frontend.image.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    {{- include "sentinela.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.port }}
  selector:
    {{- include "sentinela.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
{{- if .Values.frontend.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    {{- include "sentinela.labels" . | nindent 4 }}
spec:
  rules:
    - host: {{ .Values.frontend.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
---
{{/* ServiceAccount */}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    {{- include "sentinela.labels" . | nindent 4 }}
{{- end }}
