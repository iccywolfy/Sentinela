name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=apps/api-gateway --workspace=apps/ingestion-service --workspace=apps/correlation-service --workspace=apps/alert-service --workspace=apps/report-service --workspace=apps/frontend
        continue-on-error: true

      - name: Build packages
        run: npx turbo run build --filter=./packages/*

      - name: Build apps
        run: npx turbo run build --filter=./apps/*

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinela
          POSTGRES_PASSWORD: sentinela
          POSTGRES_DB: sentinela
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://sentinela:sentinela@localhost:5432/sentinela

      - name: Run tests
        run: npx turbo run test
        env:
          DATABASE_URL: postgresql://sentinela:sentinela@localhost:5432/sentinela
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-build
    strategy:
      matrix:
        service:
          - api-gateway
          - ingestion-service
          - correlation-service
          - alert-service
          - report-service
          - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.service }}
          push: false
          tags: sentinela/${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-nlp:
    name: Docker Build (NLP)
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build NLP service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/nlp-service
          push: false
          tags: sentinela/nlp-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
