version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# SENTINELA — Local Development Stack
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  NODE_ENV: development
  DATABASE_URL: postgresql://sentinela:sentinela@postgres:5432/sentinela
  REDIS_URL: redis://redis:6379
  KAFKA_BROKERS: kafka:9092
  ELASTICSEARCH_URL: http://elasticsearch:9200
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  S3_BUCKET: sentinela
  AUTH_KEYCLOAK_URL: http://keycloak:8080
  AUTH_KEYCLOAK_REALM: sentinela
  AUTH_KEYCLOAK_CLIENT_ID: sentinela-api
  JWT_SECRET: dev-jwt-secret-change-in-prod
  NLP_SERVICE_URL: http://nlp-service:8000
  INGESTION_SERVICE_URL: http://ingestion-service:3001
  CORRELATION_SERVICE_URL: http://correlation-service:3002
  ALERT_SERVICE_URL: http://alert-service:3003
  REPORT_SERVICE_URL: http://report-service:3004

services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: sentinela-postgres
    environment:
      POSTGRES_USER: sentinela
      POSTGRES_PASSWORD: sentinela
      POSTGRES_DB: sentinela
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinela"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: sentinela-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 20s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sentinela-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: sentinela-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: sentinela-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 10
    volumes:
      - kafka_data:/var/lib/kafka

  minio:
    image: minio/minio:latest
    container_name: sentinela-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: sentinela-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/sentinela
      KC_DB_USERNAME: sentinela
      KC_DB_PASSWORD: sentinela
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import

  # ─── Application Services ────────────────────────────────────────────────────

  ingestion-service:
    build:
      context: ./apps/ingestion-service
      dockerfile: Dockerfile
    container_name: sentinela-ingestion
    environment:
      <<: *common-env
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/ingestion-service:/app
      - /app/node_modules
    restart: unless-stopped

  correlation-service:
    build:
      context: ./apps/correlation-service
      dockerfile: Dockerfile
    container_name: sentinela-correlation
    environment:
      <<: *common-env
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  alert-service:
    build:
      context: ./apps/alert-service
      dockerfile: Dockerfile
    container_name: sentinela-alert
    environment:
      <<: *common-env
      PORT: 3003
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  report-service:
    build:
      context: ./apps/report-service
      dockerfile: Dockerfile
    container_name: sentinela-report
    environment:
      <<: *common-env
      PORT: 3004
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  nlp-service:
    build:
      context: ./apps/nlp-service
      dockerfile: Dockerfile
    container_name: sentinela-nlp
    environment:
      PORT: 8000
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    container_name: sentinela-api
    environment:
      <<: *common-env
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: sentinela-frontend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

  # ─── Observability ───────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sentinela-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:10.4.0
    container_name: sentinela-grafana
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: sentinela
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:
  elasticsearch_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: sentinela-network
